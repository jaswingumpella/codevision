name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: codevision
          POSTGRES_USER: codevision
          POSTGRES_PASSWORD: codevision
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build and test backend
        run: mvn -f backend/pom.xml -pl api verify -Dskip.frontend=true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/codevision
          SPRING_DATASOURCE_USERNAME: codevision
          SPRING_DATASOURCE_PASSWORD: codevision

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm --prefix frontend ci
      - name: Run tests
        run: npm --prefix frontend test -- --watchAll=false
      - name: Build
        run: npm --prefix frontend run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t codevision:latest .
